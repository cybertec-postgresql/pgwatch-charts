# Verifies that providing existingSecret for both app and admin credentials
# causes the chart to skip creating its own Secrets and instead reference the
# provided Secrets via secretKeyRef in the Deployment and StatefulSet.
#
# Prerequisites: the referenced Secrets must exist before helm install.
# Create them manually or via extraDeploy (not shown here — keep this file
# focused on the chart's credential-handling logic only).
#
# Verify with:
#   helm template pgwatch . \
#     -f test_scenarios/template-checks/credentials-existing-secret.yaml \
#     --show-only templates/secrets.yaml
#
# Expected: output contains no Secret named pgwatch-postgresql-secret-pgwatch
# and no Secret named pgwatch-postgresql-secret-postgres — the chart must not
# create its own Secrets when existingSecret is set for both.
#
# Also confirm the pgwatch Deployment references the correct Secret keys:
#   helm template pgwatch . \
#     -f test_scenarios/template-checks/credentials-existing-secret.yaml \
#     --show-only templates/pgwatch-deployment.yaml \
#     | grep -A3 'PGWATCH_USER'
#
# Expected: secretKeyRef.name matches the existingSecret values below and
# secretKeyRef.key matches the usernameKey / passwordKey values below.

pgwatch:
  postgres:
    credentials:
      existingSecret: pgwatch-app-credentials
      usernameKey: username
      passwordKey: password
    adminCredentials:
      existingSecret: pgwatch-admin-credentials
      passwordKey: password

  prometheus:
    enablePromSink: false  # not the focus; keeps the render minimal

  grafana:
    enableGrafana: false   # not the focus; keeps the render minimal
