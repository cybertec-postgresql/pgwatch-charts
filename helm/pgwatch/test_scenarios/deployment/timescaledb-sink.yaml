# Full-stack: TimescaleDB sink, Prometheus, Grafana (custom Deployment).
# Requires subchart: helm dependency update helm/pgwatch
# Deploy: make deploy SCENARIO=timescaledb-sink

pgwatch:
  env:
    PW_LOGLEVEL: "debug"

  postgres:
    enablePgSink: true
    settings:
      retentionDays: 7
    # credentials is still required: pgwatch app user connecting to TimescaleDB.
    credentials:
      username: pgwatch
      password: pgwatchtest
    # adminCredentials is ignored when timescaledb.enabled: true;
    # set the TimescaleDB admin password via timescaledb.auth.postgresPassword instead.

  prometheus:
    enablePromSink: true
    newPrometheus:
      createPrometheus: true
      settings:
        retentionDays: 7
      volume:
        size: '2Gi'

  grafana:
    useSubchart: false
    enableGrafana: true

timescaledb:
  enabled: true
  auth:
    postgresPassword: pgwatchadmin
