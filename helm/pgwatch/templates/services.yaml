apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "pgwatch.commonLabels" (dict "root" . "component" "pgwatch") | nindent 4 }}
  name: pgwatch-svc
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: pgwatch
      port: {{ .Values.pgwatch.webPort }}
      targetPort: {{ .Values.pgwatch.webPort }}
{{- if include "pgwatch.isTrue" (include "pgwatch.prometheus.newPrometheus.createPrometheus" .) }}
    - name: pgwatch-prometheus-sink
      port: 9188
      targetPort: 9188
{{ end }}
  selector:
    {{- include "pgwatch.selectorLabels" (dict "root" . "component" "pgwatch") | nindent 4 }}
---
{{/*
  grafana-svc is only needed for the custom Grafana Deployment.
  When useSubchart: true the official Grafana subchart creates its own Service.
*/}}
{{- if and (include "pgwatch.isTrue" (include "pgwatch.grafana.enableGrafana" .)) (not .Values.pgwatch.grafana.useSubchart) }}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "pgwatch.commonLabels" (dict "root" . "component" "grafana") | nindent 4 }}
  name: grafana-svc
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
  selector:
    {{- include "pgwatch.selectorLabels" (dict "root" . "component" "grafana") | nindent 4 }}
---
{{ end }}
{{/*
  postgres-svc is only needed for the built-in PostgreSQL StatefulSet.
  When timescaledb.enabled: true the TimescaleDB subchart creates its own Service.
*/}}
{{- if and (include "pgwatch.isTrue" (include "pgwatch.postgres.createMetricDatabase" .)) (not .Values.timescaledb.enabled) }}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "pgwatch.commonLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  name: postgres-svc
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
  selector:
    {{- include "pgwatch.selectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
{{ end }}
---
{{- if include "pgwatch.isTrue" (include "pgwatch.prometheus.newPrometheus.createPrometheus" .) }}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "pgwatch.commonLabels" (dict "root" . "component" "prometheus") | nindent 4 }}
  name: pgwatch-prometheus-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
  - name: prometheus
    port: 9090
  selector:
    {{- include "pgwatch.selectorLabels" (dict "root" . "component" "prometheus") | nindent 4 }}
{{ end }}
