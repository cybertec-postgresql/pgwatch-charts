{{/*
  Skipped when timescaledb.enabled: true — the TimescaleDB subchart provides the
  database in that case and db-init-job.yaml handles schema/user bootstrapping.
*/}}
{{- if and (include "pgwatch.isTrue" (include "pgwatch.postgres.createMetricDatabase" .)) (not .Values.timescaledb.enabled) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgwatch.commonLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: "postgres-svc"
  replicas: 1
  selector:
    matchLabels:
      {{- include "pgwatch.selectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgwatch.commonLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      {{- include "pgwatch.podSecurityContext" (dict "global" .Values.securityContext "component" .Values.pgwatch.postgres.securityContext) | nindent 6 }}
      initContainers:
      - name: init-permissions
        env:
        - name: PGDATA
          value: /pgdata/data
        image: {{ (include "pgwatch.postgres.newPgDatabase.image" .) }}
        {{- with .Values.pgwatch.postgres.newPgDatabase.initContainers.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command:
        - /bin/sh
        - -c
        - |
          if [ ! -d "$PGDATA" ]; then
            if [ "$(id -u)" = "0" ]; then
              mkdir -p "$PGDATA"
              chown postgres "$PGDATA"
              chmod 700 "$PGDATA"
            fi
          fi
        # Init container must run as root to perform chown; this overrides any pod/global
        # security context so the filesystem can be prepared for the postgres user.
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        volumeMounts:
        - name: pgdata
          mountPath: /pgdata
      containers:
      - name: postgres
        {{- include "pgwatch.containerSecurityContext" (dict "global" .Values.securityContext "component" .Values.pgwatch.postgres.securityContext) | nindent 8 }}
        image: {{ (include "pgwatch.postgres.newPgDatabase.image" .) }}
        {{- with .Values.pgwatch.postgres.newPgDatabase.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: 5432
          name: postgres
        env:
          {{- include "pgwatch.postgres.env" . | nindent 8 }}
        {{- with .Values.pgwatch.postgres.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: pgdata
          mountPath: /pgdata
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: pgdata
      labels:
        {{- include "pgwatch.commonLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ (include "pgwatch.postgres.newPgDatabase.volume.storageClass" .) }}
      resources:
        requests:
          storage: {{ (include "pgwatch.postgres.newPgDatabase.volume.size" .) }}
{{ end }}
