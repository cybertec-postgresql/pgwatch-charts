{{- if include "pgwatch.isTrue" (include "pgwatch.prometheus.newPrometheus.createPrometheus" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "pgwatch.commonLabels" (dict "root" . "component" "prometheus") | nindent 4 }}
  name: pgwatch-prometheus-cm
data:
  prometheus.yml: |
    ---
    global:
      scrape_interval: 1m
      scrape_timeout: 15s
      evaluation_interval: 5s

    scrape_configs:
    - job_name: 'pgwatch'
      static_configs:
        - targets: ['pgwatch-svc.{{ .Release.Namespace }}.svc.cluster.local:9188']

    rule_files:
      - /etc/prometheus/alert-rules.d/*.yml
{{ end }}
