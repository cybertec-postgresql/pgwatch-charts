{{/*
  pgwatch-sources-config.yaml
  Creates a ConfigMap containing user-supplied source YAML files.
  Rendered when pgwatch.sources.files is non-empty.
*/}}
{{- if .Values.pgwatch.sources.files }}
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "pgwatch.commonLabels" (dict "root" . "component" "pgwatch") | nindent 4 }}
  name: pgwatch-sources-cm
  namespace: {{ .Release.Namespace }}
data:
{{- range $name, $content := .Values.pgwatch.sources.files }}
  {{ $name | quote }}: |
{{ $content | indent 4 }}
{{- end }}
{{- end }}
