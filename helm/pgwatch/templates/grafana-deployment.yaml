{{/*
  Skipped when pgwatch.grafana.useSubchart: true — the official Grafana subchart
  provides the Grafana instance in that case (see grafana: top-level values block).
*/}}
{{- if and (include "pgwatch.isTrue" (include "pgwatch.grafana.enableGrafana" .)) (not .Values.pgwatch.grafana.useSubchart) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    application: pgwatch
    pgwatch.pods.role: grafana
  name: grafana
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      application: pgwatch
      pgwatch.pods.role: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        application: pgwatch
        pgwatch.pods.role: grafana
    spec:
      {{- include "pgwatch.podSecurityContext" (dict "global" .Values.securityContext "component" .Values.pgwatch.grafana.securityContext) | nindent 6 }}
      containers:
        - env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/postgresql/1-global-db-overview.json
          #  - name: GF_INSTALL_PLUGINS
          #    value: marcusolsson-treemap-panel
            {{- if include "pgwatch.isTrue" (include "pgwatch.postgres.createMetricDatabase" .) }}
            - name: GF_DATABASE_TYPE
              value: postgres
            - name: GF_DATABASE_HOST
              value: "{{ include "pgwatch.dbHost" . }}:5432"
            - name: GF_DATABASE_NAME
              value: pgwatch_grafana
            - name: GF_DATABASE_SSL_MODE
              value: disable
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgwatch.credentialSecretName" . }}
                  key: {{ include "pgwatch.credentialUsernameKey" . }}
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgwatch.credentialSecretName" . }}
                  key: {{ include "pgwatch.credentialPasswordKey" . }}
            # Separate credentials for the pgwatch-metrics datasource.
            - name: PGWATCH_METRICS_DS_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgwatch.credentialSecretName" . }}
                  key: {{ include "pgwatch.credentialUsernameKey" . }}
            - name: PGWATCH_METRICS_DS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgwatch.credentialSecretName" . }}
                  key: {{ include "pgwatch.credentialPasswordKey" . }}
            {{- else if (include "pgwatch.postgres.hasUseExistingDatabase" .) }}
            - name: GF_DATABASE_TYPE
              value: postgres
            - name: GF_DATABASE_HOST
              value: {{ (include "pgwatch.postgres.useExistingDatabase.endpoint" .) }}
              # TODO: Port?
              # value: "{{ (include "pgwatch.postgres.useExistingDatabase.endpoint" .) }}:{{ (include "pgwatch.postgres.useExistingDatabase.port" .) }}"
            - name: GF_DATABASE_NAME
              value: {{ (include "pgwatch.postgres.useExistingDatabase.grafanaDatabase" .) | default "pgwatch_grafana" }}
            - name: GF_DATABASE_SSL_MODE
              value: {{ (include "pgwatch.postgres.useExistingDatabase.sslmode" .) }}
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgwatch.credentialSecretName" . }}
                  key: {{ include "pgwatch.credentialUsernameKey" . }}
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgwatch.credentialSecretName" . }}
                  key: {{ include "pgwatch.credentialPasswordKey" . }}
            - name: PGWATCH_METRICS_DS_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgwatch.credentialSecretName" . }}
                  key: {{ include "pgwatch.credentialUsernameKey" . }}
            - name: PGWATCH_METRICS_DS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgwatch.credentialSecretName" . }}
                  key: {{ include "pgwatch.credentialPasswordKey" . }}
            {{- end }}
            {{- range $key, $value := .Values.pgwatch.grafana.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.pgwatch.grafana.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ .Values.pgwatch.grafana.image }}
          name: grafana
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/grafana/provisioning/datasources/pg_ds.yml
              name: grafana-datasources
              subPath: pg_ds.yml
            - mountPath: /etc/grafana/provisioning/dashboards/dashboards_provider.yml
              name: grafana-dashboard-config
              subPath: dashboards_provider.yml
            - mountPath: /var/lib/grafana/dashboards
              name: grafana-dashboards
          {{- include "pgwatch.containerSecurityContext" (dict "global" .Values.securityContext "component" .Values.pgwatch.grafana.securityContext) | nindent 10 }}
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: postgres_datasource.yml
                path: pg_ds.yml
            name: grafana-datasources
          name: grafana-datasources
        - name: grafana-dashboard-config
          configMap:
            name: grafana-dashboard-config
        - name: grafana-dashboards
          projected:
            defaultMode: 416
            sources:
              {{- if include "pgwatch.isTrue" (include "pgwatch.postgres.enablePgSink" .) }}
              {{- range $path, $_ := .Files.Glob "dashboards/postgresql/*.json" }}
              - configMap:
                  name: "grafana-postgresql-dashboard-{{ base $path | lower | replace "." "-" | replace "_" "-" }}"
                  items:
                    - key: {{ base $path }}
                      path: "postgresql/{{ base $path }}"
              {{- end }}
              {{- end }}

              {{- if include "pgwatch.isTrue" (include "pgwatch.prometheus.enablePromSink" .) }}
              {{- range $path, $_ := .Files.Glob "dashboards/prometheus/*.json" }}
              - configMap:
                  name: "grafana-prometheus-dashboard-{{ base $path | lower | replace "." "-" | replace "_" "-" }}"
                  items:
                    - key: {{ base $path }}
                      path: "prometheus/{{ base $path }}"
              {{- end }}
              {{- end }}
{{ end }}
---
{{/*
  grafana-datasources ConfigMap — rendered for BOTH Grafana deployment modes.

  Custom Deployment (useSubchart: false):
    Mounted as a volume inside the Grafana pod at
    /etc/grafana/provisioning/datasources/pg_ds.yml  (via subPath).

  Grafana Subchart (useSubchart: true):
    The grafana_datasource: "1" label is watched by the k8s-sidecar container,
    which automatically injects the content into Grafana's datasources
    provisioning directory — no pod restart required.

*/}}
{{- if include "pgwatch.isTrue" (include "pgwatch.grafana.enableGrafana" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
    # Custom Deployment (useSubchart: false): mounted via subPath into
    #   /etc/grafana/provisioning/datasources/pg_ds.yml
    #   Check volumeMounts for the deployment.
    #
    # Grafana subchart (useSubchart: true): picked up by the k8s-sidecar
    #   via the grafana_datasource: "1" label below.
  labels:
    application: pgwatch
    {{- if .Values.pgwatch.grafana.useSubchart }}
    # Watched by the Grafana subchart sidecar (sidecar.datasources.label: grafana_datasource).
    grafana_datasource: "1"
    {{- end }}
  name: grafana-datasources
  namespace: {{ .Release.Namespace }}
data:
  postgres_datasource.yml: |
    apiVersion: 1
    datasources:
  {{- if include "pgwatch.isTrue" (include "pgwatch.grafana.enableDatasources.postgres" .) }}
  {{- if include "pgwatch.isTrue" (include "pgwatch.postgres.createMetricDatabase" .) }}
    - name: pgwatch-metrics
      type: postgres
      url: "{{ include "pgwatch.dbHost" . }}:5432"
      access: proxy
      user: "${PGWATCH_METRICS_DS_USER}"
      isDefault: true
      jsonData:
        database: pgwatch_metrics
        sslmode: disable
        # TODO: Automate setting of postgresVersion
        postgresVersion: 1800
      secureJsonData:
        password: "${PGWATCH_METRICS_DS_PASSWORD}"
      version: 1
      editable: true
  {{- else if (include "pgwatch.postgres.hasUseExistingDatabase" .) }}
    - name: pgwatch-metrics
      type: postgres
      url: {{ (include "pgwatch.postgres.useExistingDatabase.endpoint" .) }}:{{ (include "pgwatch.postgres.useExistingDatabase.port" .) }}
      access: proxy
      user: "${PGWATCH_METRICS_DS_USER}"
      isDefault: true
      jsonData:
        database: {{ (include "pgwatch.postgres.useExistingDatabase.database" .) }}
        sslmode: {{ (include "pgwatch.postgres.useExistingDatabase.sslmode" .) | default "disable" }}
      secureJsonData:
        password: "${PGWATCH_METRICS_DS_PASSWORD}"
      version: 1
      editable: true
  {{ end }}
  {{ end }}
  {{- if include "pgwatch.isTrue" (include "pgwatch.grafana.enableDatasources.prometheus" .) }}
    - name: PROMETHEUS
      type: prometheus
      access: proxy
      orgId: 1
      url: http://pgwatch-prometheus-svc:9090
      password:
      user:
      database:
      basicAuth:
      basicAuthUser:
      basicAuthPassword:
      withCredentials:
      {{- if not (include "pgwatch.isTrue" (include "pgwatch.grafana.enableDatasources.postgres" .)) }}
      isDefault: true
      {{- end}}
      version: 1
      editable: false
  {{ end }}
{{- end }}
