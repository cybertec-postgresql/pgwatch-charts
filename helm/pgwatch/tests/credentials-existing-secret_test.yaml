suite: credentials-existing-secret
values:
  - ../test_scenarios/template-checks/credentials-existing-secret.yaml
tests:
  - it: does not create app or admin Secrets when both existingSecrets are set
    template: templates/secrets.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: pgwatch Deployment references existingSecret for PGWATCH_USER
    template: templates/pgwatch-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGWATCH_USER
            valueFrom:
              secretKeyRef:
                name: pgwatch-app-credentials
                key: username
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGWATCH_USER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pgwatch-app-credentials
                key: password
