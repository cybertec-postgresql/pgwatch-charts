suite: env-merge-reserved-key
values:
  - ../test_scenarios/template-checks/env-merge-reserved-key.yaml
tests:
  - it: render fails when a reserved env key is set in pgwatch.env
    template: templates/pgwatch-deployment.yaml
    asserts:
      - failedTemplate:
          errorMessage: 'pgwatch.env: "PGWATCH_USER" is reserved and managed by the chart; set .Values.pgwatch.postgres.credentials.existingSecret and .Values.pgwatch.postgres.credentials.usernameKey instead'
